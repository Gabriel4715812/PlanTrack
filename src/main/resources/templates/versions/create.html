<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
    <title>Nueva Versión</title>
</head>

<body>

<div layout:fragment="content">

    <div class="container-fluid">

        <div class="mb-4">
            <h2 class="page-title mb-1">Registrar Nueva Versión</h2>
            <p class="text-muted mb-0">
                Cargue una nueva versión para el plano seleccionado.
            </p>
        </div>

        <div class="row g-4">

            <div class="col-md-4">

                <div class="card shadow-sm border-0">

                    <div class="card-header bg-dark text-white">
                        Plano seleccionado
                    </div>

                    <div class="card-body">

                        <p>
                            <strong>Código:</strong><br>
                            <span th:text="${flat.code}"></span>
                        </p>

                        <p>
                            <strong>Nombre:</strong><br>
                            <span th:text="${flat.name}"></span>
                        </p>

                        <p>
                            <strong>Versión actual:</strong><br>
                            <span class="badge bg-info text-dark"
                                  th:text="'V' + ${flat.currentVersionNumber}">
                            </span>
                        </p>

                        <p>
                            <strong>Ubicación:</strong><br>
                            <span th:text="${flat.position.part.equipment.sector.name}"></span>
                            /
                            <span th:text="${flat.position.part.equipment.name}"></span>
                            /
                            <span th:text="${flat.position.part.name}"></span>
                            /
                            <span th:text="${flat.position.name}"></span>
                        </p>

                    </div>

                </div>

            </div>

            <div class="col-md-8">

                <div class="card shadow-sm border-0">

                    <div class="card-body">

                        <div class="alert alert-danger"
                             th:if="${error != null}"
                             th:text="${error}">
                        </div>

                        <form th:action="@{'/versions/save/' + ${flat.id}}"
                              th:object="${version}"
                              method="post"
                              enctype="multipart/form-data">

                            <input type="hidden"
                                   th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}">

                            <input type="hidden"
                                   th:field="*{flatId}">

                            <div class="mb-3">
                                <label for="changeDescription" class="form-label">
                                    Descripción del cambio
                                </label>

                                <textarea id="changeDescription"
                                          class="form-control"
                                          rows="4"
                                          th:field="*{changeDescription}"
                                          placeholder="Ejemplo: Corrección de cotas, actualización por modificación de pieza, nuevo diseño, etc."></textarea>

                                <div class="text-danger small"
                                     th:if="${#fields.hasErrors('changeDescription')}"
                                     th:errors="*{changeDescription}">
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="file" class="form-label">
                                    Archivo de la nueva versión
                                </label>

                                <input type="file"
                                       id="file"
                                       class="form-control"
                                       th:field="*{file}"
                                       accept=".pdf,.dwg,.dxf,.png,.jpg,.jpeg">

                                <div class="form-text">
                                    Formatos sugeridos: PDF, DWG, DXF, PNG o JPG.
                                </div>
                            </div>

                            <div class="d-flex justify-content-end gap-2">

                                <a th:href="@{'/versions/flat/' + ${flat.id}}"
                                   class="btn btn-secondary">
                                    Cancelar
                                </a>

                                <button type="submit" class="btn btn-primary">
                                    Guardar Versión
                                </button>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
