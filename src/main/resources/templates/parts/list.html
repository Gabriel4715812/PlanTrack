<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
    <title>Gestión de Piezas</title>
</head>

<body>

<div layout:fragment="content">

    <div class="container-fluid">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="page-title mb-1">Gestión de Piezas</h2>
                <p class="text-muted mb-0">
                    Administración de piezas asociadas a los equipos industriales.
                </p>
            </div>

            <a th:href="@{/parts/new}" class="btn btn-primary">
                + Nueva Pieza
            </a>
        </div>

        <div class="card shadow-sm border-0 mb-4">
            <div class="card-body">

                <form th:action="@{/parts/search}" method="get" class="row g-3">

                    <div class="col-md-8">
                        <input type="text"
                               name="name"
                               class="form-control"
                               placeholder="Buscar pieza por nombre..."
                               th:value="${keyword}">
                    </div>

                    <div class="col-md-2">
                        <button type="submit" class="btn btn-secondary w-100">
                            Buscar
                        </button>
                    </div>

                    <div class="col-md-2">
                        <a th:href="@{/parts}" class="btn btn-outline-secondary w-100">
                            Limpiar
                        </a>
                    </div>

                </form>

            </div>
        </div>

        <div class="card shadow-sm border-0">

            <div class="card-body">

                <div class="table-responsive">

                    <table class="table table-hover align-middle">

                        <thead class="table-dark">
                        <tr>
                            <th>Código</th>
                            <th>Nombre</th>
                            <th>Descripción</th>
                            <th>Equipo</th>
                            <th>Sector</th>
                            <th>Estado</th>
                            <th class="text-end">Acciones</th>
                        </tr>
                        </thead>

                        <tbody>

                        <tr th:if="${#lists.isEmpty(parts)}">
                            <td colspan="7" class="text-center text-muted py-4">
                                No hay piezas registradas.
                            </td>
                        </tr>

                        <tr th:each="part : ${parts}">

                            <td th:text="${part.code}"></td>

                            <td th:text="${part.name}"></td>

                            <td th:text="${part.description != null && !part.description.isEmpty() ? part.description : 'Sin descripción'}"></td>

                            <td th:text="${part.equipment.name}"></td>

                            <td th:text="${part.equipment.sector.name}"></td>

                            <td>
                                <span th:if="${part.active}" class="badge bg-success">
                                    Activa
                                </span>

                                <span th:unless="${part.active}" class="badge bg-secondary">
                                    Inactiva
                                </span>
                            </td>

                            <td class="text-end">

                                <a th:href="@{'/parts/edit/' + ${part.id}}"
                                   class="btn btn-warning btn-sm">
                                    Editar
                                </a>

                                <a th:href="@{'/parts/delete/' + ${part.id}}"
                                   class="btn btn-danger btn-sm"
                                   onclick="return confirm('¿Desea deshabilitar esta pieza?')">
                                    Eliminar
                                </a>

                            </td>

                        </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
