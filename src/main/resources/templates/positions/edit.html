<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
    <title>Editar Posición</title>
</head>

<body>

<div layout:fragment="content">

    <div class="container-fluid">

        <div class="mb-4">
            <h2 class="page-title mb-1">Editar Posición</h2>
            <p class="text-muted mb-0">
                Modifique los datos registrados de la posición seleccionada.
            </p>
        </div>

        <div class="card shadow-sm border-0">

            <div class="card-body">

                <div class="alert alert-danger"
                     th:if="${error != null}"
                     th:text="${error}">
                </div>

                <form th:action="@{'/positions/update/' + ${position.id}}"
                      th:object="${position}"
                      method="post">

                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}">

                    <input type="hidden" th:field="*{id}">

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label for="name" class="form-label">
                                Nombre de la posición
                            </label>

                            <input type="text"
                                   id="name"
                                   class="form-control"
                                   th:field="*{name}">

                            <div class="text-danger small"
                                 th:if="${#fields.hasErrors('name')}"
                                 th:errors="*{name}">
                            </div>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="code" class="form-label">
                                Código
                            </label>

                            <input type="number"
                                   id="code"
                                   class="form-control"
                                   th:field="*{code}">

                            <div class="text-danger small"
                                 th:if="${#fields.hasErrors('code')}"
                                 th:errors="*{code}">
                            </div>
                        </div>

                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">
                            Descripción
                        </label>

                        <textarea id="description"
                                  class="form-control"
                                  rows="4"
                                  th:field="*{description}"></textarea>

                        <div class="text-danger small"
                             th:if="${#fields.hasErrors('description')}"
                             th:errors="*{description}">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="partId" class="form-label">
                            Pieza
                        </label>

                        <select id="partId"
                                class="form-select"
                                th:field="*{partId}">

                            <option value="">
                                Seleccione una pieza...
                            </option>

                            <option th:each="part : ${parts}"
                                    th:value="${part.id}"
                                    th:text="${part.name + ' - Equipo: ' + part.equipment.name + ' - Sector: ' + part.equipment.sector.name}">
                            </option>

                        </select>

                        <div class="text-danger small"
                             th:if="${#fields.hasErrors('partId')}"
                             th:errors="*{partId}">
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-2">

                        <a th:href="@{/positions}" class="btn btn-secondary">
                            Cancelar
                        </a>

                        <button type="submit" class="btn btn-primary">
                            Actualizar Posición
                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
