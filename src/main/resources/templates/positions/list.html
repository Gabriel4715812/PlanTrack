<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
    <title>Gestión de Posiciones</title>
</head>

<body>

<div layout:fragment="content">

    <div class="container-fluid">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="page-title mb-1">Gestión de Posiciones</h2>
                <p class="text-muted mb-0">
                    Administración de posiciones técnicas asociadas a las piezas.
                </p>
            </div>

            <a th:href="@{/positions/new}" class="btn btn-primary">
                + Nueva Posición
            </a>
        </div>

        <div class="card shadow-sm border-0 mb-4">
            <div class="card-body">

                <form th:action="@{/positions/search}" method="get" class="row g-3">

                    <div class="col-md-8">
                        <input type="text"
                               name="name"
                               class="form-control"
                               placeholder="Buscar posición por nombre..."
                               th:value="${keyword}">
                    </div>

                    <div class="col-md-2">
                        <button type="submit" class="btn btn-secondary w-100">
                            Buscar
                        </button>
                    </div>

                    <div class="col-md-2">
                        <a th:href="@{/positions}" class="btn btn-outline-secondary w-100">
                            Limpiar
                        </a>
                    </div>

                </form>

            </div>
        </div>

        <div class="card shadow-sm border-0">

            <div class="card-body">

                <div class="table-responsive">

                    <table class="table table-hover align-middle">

                        <thead class="table-dark">
                        <tr>
                            <th>Código</th>
                            <th>Nombre</th>
                            <th>Descripción</th>
                            <th>Pieza</th>
                            <th>Equipo</th>
                            <th>Sector</th>
                            <th>Estado</th>
                            <th class="text-end">Acciones</th>
                        </tr>
                        </thead>

                        <tbody>

                        <tr th:if="${#lists.isEmpty(positions)}">
                            <td colspan="8" class="text-center text-muted py-4">
                                No hay posiciones registradas.
                            </td>
                        </tr>

                        <tr th:each="position : ${positions}">

                            <td th:text="${position.code}"></td>

                            <td th:text="${position.name}"></td>

                            <td th:text="${position.description != null && !position.description.isEmpty() ? position.description : 'Sin descripción'}"></td>

                            <td th:text="${position.part.name}"></td>

                            <td th:text="${position.part.equipment.name}"></td>

                            <td th:text="${position.part.equipment.sector.name}"></td>

                            <td>
                                <span th:if="${position.active}" class="badge bg-success">
                                    Activa
                                </span>

                                <span th:unless="${position.active}" class="badge bg-secondary">
                                    Inactiva
                                </span>
                            </td>

                            <td class="text-end">

                                <a th:href="@{'/positions/edit/' + ${position.id}}"
                                   class="btn btn-warning btn-sm">
                                    Editar
                                </a>

                                <a th:href="@{'/positions/delete/' + ${position.id}}"
                                   class="btn btn-danger btn-sm"
                                   onclick="return confirm('¿Desea deshabilitar esta posición?')">
                                    Eliminar
                                </a>

                            </td>

                        </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
