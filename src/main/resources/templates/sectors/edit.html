<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
    <title>Editar Sector</title>
</head>

<body>

<div layout:fragment="content">

    <div class="container-fluid">

        <div class="mb-4">
            <h2 class="page-title mb-1">Editar Sector</h2>
            <p class="text-muted mb-0">
                Modifique los datos del sector seleccionado.
            </p>
        </div>

        <div class="card shadow-sm border-0">

            <div class="card-body">

                <form th:action="@{'/sectors/update/' + ${sector.id}}"
                      th:object="${sector}"
                      method="post">

                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}">

                    <input type="hidden" th:field="*{id}">

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label for="name" class="form-label">
                                Nombre del sector
                            </label>

                            <input type="text"
                                   id="name"
                                   class="form-control"
                                   th:field="*{name}">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="code" class="form-label">
                                Código
                            </label>

                            <input type="text"
                                   id="code"
                                   class="form-control"
                                   th:field="*{code}">
                        </div>

                    </div>

                    <div class="d-flex justify-content-end gap-2">

                        <a th:href="@{/sectors}" class="btn btn-secondary">
                            Cancelar
                        </a>

                        <button type="submit" class="btn btn-primary">
                            Actualizar Sector
                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
