<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
    <title>Gestión de Sectores</title>
</head>

<body>

<div layout:fragment="content">

    <div class="container-fluid">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="page-title mb-1">Gestión de Sectores</h2>
                <p class="text-muted mb-0">
                    Administración de sectores industriales de la organización.
                </p>
            </div>

            <a th:href="@{/sectors/new}" class="btn btn-primary">
                Nuevo Sector
            </a>
        </div>

        <div class="card shadow-sm border-0 mb-4">
            <div class="card-body">

                <form th:action="@{/sectors}" method="get" class="row g-3">

                    <div class="col-md-8">
                        <input type="text"
                               name="keyword"
                               class="form-control"
                               placeholder="Buscar sector por nombre o código..."
                               th:value="${keyword}">
                    </div>

                    <div class="col-md-2">
                        <button type="submit" class="btn btn-secondary w-100">
                            Buscar
                        </button>
                    </div>

                    <div class="col-md-2">
                        <a th:href="@{/sectors}" class="btn btn-outline-secondary w-100">
                            Limpiar
                        </a>
                    </div>

                </form>

            </div>
        </div>

        <div class="card shadow-sm border-0">

            <div class="card-body">

                <div class="table-responsive">

                    <table class="table table-hover align-middle">

                        <thead class="table-dark">
                        <tr>
                            <th>Código</th>
                            <th>Nombre</th>
                            <th>Estado</th>
                            <th class="text-end">Acciones</th>
                        </tr>
                        </thead>

                        <tbody>

                        <tr th:if="${#lists.isEmpty(sectors)}">
                            <td colspan="4" class="text-center text-muted py-4">
                                No hay sectores registrados.
                            </td>
                        </tr>

                        <tr th:each="sector : ${sectors}">

                            <td th:text="${sector.code}"></td>

                            <td th:text="${sector.name}"></td>

                            <td>
                                <span th:if="${sector.active}" class="badge bg-success">
                                    Activo
                                </span>

                                <span th:unless="${sector.active}" class="badge bg-secondary">
                                    Inactivo
                                </span>
                            </td>

                            <td class="text-end">

                                <a th:href="@{'/sectors/edit/' + ${sector.id}}"
                                   class="btn btn-warning btn-sm">
                                    Editar
                                </a>

                                <a th:href="@{'/sectors/delete/' + ${sector.id}}"
                                   class="btn btn-danger btn-sm"
                                   onclick="return confirm('¿Desea deshabilitar este sector?')">
                                    Eliminar
                                </a>

                            </td>

                        </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
