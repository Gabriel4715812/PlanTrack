<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PlanTrack</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3a5f, #0f1f33);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            overflow: hidden;
        }

        .login-header {
            background-color: #1e3a5f;
            color: #ffffff;
            padding: 28px;
            text-align: center;
        }

        .login-header h1 {
            margin: 0;
            font-size: 34px;
            font-weight: bold;
        }

        .login-header p {
            margin-top: 8px;
            margin-bottom: 0;
            color: #dbe4ee;
        }

        .login-body {
            padding: 32px;
        }

        .btn-plantrack {
            background-color: #f28c28;
            border-color: #f28c28;
            color: #ffffff;
            font-weight: bold;
        }

        .btn-plantrack:hover {
            background-color: #d97706;
            border-color: #d97706;
            color: #ffffff;
        }

        .register-link {
            color: #1e3a5f;
            font-weight: bold;
            text-decoration: none;
        }

        .register-link:hover {
            color: #f28c28;
        }
    </style>
</head>

<body>

<div class="login-card">

    <div class="login-header">
        <h1>PlanTrack</h1>
        <p>Sistema de gestión de planos técnicos</p>
    </div>

    <div class="login-body">

        <h3 class="text-center mb-4">
            Iniciar sesión
        </h3>

        <div class="alert alert-danger"
             th:if="${param.error}">
            Usuario o contraseña incorrectos.
        </div>

        <div class="alert alert-success"
             th:if="${param.logout}">
            Sesión cerrada correctamente.
        </div>

        <div class="alert alert-success"
             th:if="${param.registered}">
            Usuario registrado correctamente. Ya puede iniciar sesión.
        </div>

        <form th:action="@{/login}" method="post">

            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">

            <div class="mb-3">
                <label for="username" class="form-label">
                    Usuario
                </label>

                <input type="text"
                       id="username"
                       name="username"
                       class="form-control"
                       placeholder="Ingrese su usuario"
                       required
                       autofocus>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">
                    Contraseña
                </label>

                <input type="password"
                       id="password"
                       name="password"
                       class="form-control"
                       placeholder="Ingrese su contraseña"
                       required>
            </div>

            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-plantrack btn-lg">
                    Ingresar
                </button>
            </div>

        </form>

        <div class="text-center mt-4">
            <span>¿No tiene una cuenta?</span>
            <a th:href="@{/register}" class="register-link">
                Registrarse
            </a>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

</body>
</html>
