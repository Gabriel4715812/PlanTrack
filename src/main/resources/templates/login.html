<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Iniciar sesión - PlanTrack</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body class="auth-body">

<div class="auth-page">

    <div class="auth-card">

        <div class="auth-brand">
            <div class="auth-brand-name">
                <span class="auth-brand-plan">Plan</span><span class="auth-brand-track">Track</span>
            </div>

            <p class="auth-brand-subtitle">
                Sistema de Gestión y Trazabilidad de Planos
            </p>
        </div>

        <div class="auth-header">
            <h1>Iniciar sesión</h1>
            <p>Ingrese sus credenciales para acceder al sistema.</p>
        </div>

        <div th:if="${param.error}" class="alert alert-danger">
            Usuario o contraseña incorrectos.
        </div>

        <div th:if="${param.logout}" class="alert alert-success">
            La sesión se cerró correctamente.
        </div>

        <div th:if="${success != null}" class="alert alert-success">
            <span th:text="${success}"></span>
        </div>

        <div th:if="${error != null}" class="alert alert-danger">
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/login}" method="post" class="auth-form">

            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">

            <div class="mb-3">
                <label for="username" class="form-label">
                    Usuario
                </label>
                <input type="text"
                       id="username"
                       name="username"
                       class="form-control auth-input"
                       placeholder="Ingrese su usuario"
                       required
                       autofocus>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">
                    Contraseña
                </label>
                <input type="password"
                       id="password"
                       name="password"
                       class="form-control auth-input"
                       placeholder="Ingrese su contraseña"
                       required>
            </div>

            <button type="submit" class="btn auth-btn-primary w-100">
                Ingresar
            </button>

        </form>

        <div class="auth-footer">
            <p>
                ¿No tiene una cuenta?
                <a th:href="@{/register}">
                    Registrarse
                </a>
            </p>
        </div>

    </div>

</div>

</body>
</html>
