<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
    <title>Editar Plano</title>
</head>

<body>

<div layout:fragment="content">

    <div class="container-fluid">

        <div class="mb-4">
            <h2 class="page-title mb-1">Editar Plano</h2>
            <p class="text-muted mb-0">
                Modifique los datos registrados del plano seleccionado.
            </p>
        </div>

        <div class="card shadow-sm border-0">

            <div class="card-body">

                <div class="alert alert-danger"
                     th:if="${error != null}"
                     th:text="${error}">
                </div>

                <form th:action="@{'/flats/update/' + ${flat.id}}"
                      th:object="${flat}"
                      method="post"
                      enctype="multipart/form-data">

                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}">

                    <input type="hidden" th:field="*{id}">

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label for="code" class="form-label">
                                Código del plano
                            </label>

                            <input type="text"
                                   id="code"
                                   class="form-control"
                                   th:field="*{code}">

                            <div class="text-danger small"
                                 th:if="${#fields.hasErrors('code')}"
                                 th:errors="*{code}">
                            </div>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="name" class="form-label">
                                Nombre del plano
                            </label>

                            <input type="text"
                                   id="name"
                                   class="form-control"
                                   th:field="*{name}">

                            <div class="text-danger small"
                                 th:if="${#fields.hasErrors('name')}"
                                 th:errors="*{name}">
                            </div>
                        </div>

                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">
                            Descripción
                        </label>

                        <textarea id="description"
                                  class="form-control"
                                  rows="4"
                                  th:field="*{description}"></textarea>

                        <div class="text-danger small"
                             th:if="${#fields.hasErrors('description')}"
                             th:errors="*{description}">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="positionId" class="form-label">
                            Posición
                        </label>

                        <select id="positionId"
                                class="form-select"
                                th:field="*{positionId}">

                            <option value="">
                                Seleccione una posición...
                            </option>

                            <option th:each="position : ${positions}"
                                    th:value="${position.id}"
                                    th:text="${position.name + ' - Pieza: ' + position.part.name + ' - Equipo: ' + position.part.equipment.name}">
                            </option>

                        </select>

                        <div class="text-danger small"
                             th:if="${#fields.hasErrors('positionId')}"
                             th:errors="*{positionId}">
                        </div>
                    </div>

                    <div class="mb-4">

                        <label for="file" class="form-label">
                            Reemplazar archivo del plano
                        </label>

                        <input type="file"
                               id="file"
                               class="form-control"
                               th:field="*{file}"
                               accept=".pdf,.dwg,.dxf,.png,.jpg,.jpeg">

                        <div class="form-text">
                            Si no selecciona un archivo nuevo, se conservará el archivo actual.
                        </div>

                        <div class="mt-2"
                             th:if="${currentFileName != null}">

                            <span class="text-muted">
                                Archivo actual:
                            </span>

                            <strong th:text="${currentFileName}"></strong>

                        </div>

                    </div>

                    <div class="d-flex justify-content-end gap-2">

                        <a th:href="@{/flats}" class="btn btn-secondary">
                            Cancelar
                        </a>

                        <button type="submit" class="btn btn-primary">
                            Actualizar Plano
                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
