<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>

    <title>Gestión de Equipos</title>

</head>

<body>

<div layout:fragment="content">

    <div class="container-fluid">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <h2>Gestión de Equipos</h2>

            <a class="btn btn-primary"
               th:href="@{/equipments/new}">

                Nuevo Equipo

            </a>

        </div>

        <form class="row mb-4"
              th:action="@{/equipments/search}"
              method="get">

            <div class="col-md-8">

                <input
                        class="form-control"
                        type="text"
                        name="name"
                        placeholder="Buscar equipo...">

            </div>

            <div class="col-md-2">

                <button class="btn btn-secondary w-100">

                    Buscar

                </button>

            </div>

        </form>

        <table class="table table-striped table-hover">

            <thead class="table-dark">

            <tr>

                <th>Código</th>

                <th>Nombre</th>

                <th>Sector</th>

                <th>Estado</th>

                <th>Acciones</th>

            </tr>

            </thead>

            <tbody>

            <tr th:each="equipment : ${equipments}">

                <td th:text="${equipment.code}"></td>

                <td th:text="${equipment.name}"></td>

                <td th:text="${equipment.sector.name}"></td>

                <td>

                    <span
                            class="badge bg-success"
                            th:if="${equipment.active}">

                        Activo

                    </span>

                </td>

                <td>

                    <a class="btn btn-warning btn-sm"

                       th:href="@{'/equipments/edit/' + ${equipment.id}}">

                        Editar

                    </a>

                    <a class="btn btn-danger btn-sm"

                       onclick="return confirm('¿Desea eliminar este equipo?')"

                       th:href="@{'/equipments/delete/' + ${equipment.id}}">

                        Eliminar

                    </a>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>

</html>
