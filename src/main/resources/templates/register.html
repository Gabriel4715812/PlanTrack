<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Registro - PlanTrack</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body class="auth-body">

<div class="auth-page">

    <div class="auth-card auth-card-wide">

        <div class="auth-brand">
            <div class="auth-brand-name">
                <span class="auth-brand-plan">Plan</span><span class="auth-brand-track">Track</span>
            </div>

            <p class="auth-brand-subtitle">
                Registro de usuario
            </p>
        </div>

        <div class="auth-header">
            <h1>Crear cuenta</h1>
            <p>Complete los datos para registrar un nuevo usuario en el sistema.</p>
        </div>

        <div th:if="${error != null}" class="alert alert-danger">
            <span th:text="${error}"></span>
        </div>

        <div th:if="${success != null}" class="alert alert-success">
            <span th:text="${success}"></span>
        </div>

        <form th:action="@{/register}"
              th:object="${user}"
              method="post"
              class="auth-form">

            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">

            <div class="row g-3">

                <div class="col-md-6">
                    <label for="firstName" class="form-label">
                        Nombre
                    </label>
                    <input type="text"
                           id="firstName"
                           th:field="*{firstName}"
                           class="form-control auth-input"
                           placeholder="Ingrese su nombre"
                           required>

                    <div class="text-danger small mt-1"
                         th:if="${#fields.hasErrors('firstName')}"
                         th:errors="*{firstName}">
                    </div>
                </div>

                <div class="col-md-6">
                    <label for="lastName" class="form-label">
                        Apellido
                    </label>
                    <input type="text"
                           id="lastName"
                           th:field="*{lastName}"
                           class="form-control auth-input"
                           placeholder="Ingrese su apellido"
                           required>

                    <div class="text-danger small mt-1"
                         th:if="${#fields.hasErrors('lastName')}"
                         th:errors="*{lastName}">
                    </div>
                </div>

                <div class="col-md-6">
                    <label for="username" class="form-label">
                        Usuario
                    </label>
                    <input type="text"
                           id="username"
                           th:field="*{username}"
                           class="form-control auth-input"
                           placeholder="Ingrese un usuario"
                           required>

                    <div class="text-danger small mt-1"
                         th:if="${#fields.hasErrors('username')}"
                         th:errors="*{username}">
                    </div>
                </div>

                <div class="col-md-6">
                    <label for="email" class="form-label">
                        Correo electrónico
                    </label>
                    <input type="email"
                           id="email"
                           th:field="*{email}"
                           class="form-control auth-input"
                           placeholder="usuario@email.com"
                           required>

                    <div class="text-danger small mt-1"
                         th:if="${#fields.hasErrors('email')}"
                         th:errors="*{email}">
                    </div>
                </div>

                <div class="col-md-6">
                    <label for="phone" class="form-label">
                        Teléfono
                    </label>
                    <input type="text"
                           id="phone"
                           th:field="*{phone}"
                           class="form-control auth-input"
                           placeholder="Ingrese su teléfono">

                    <div class="text-danger small mt-1"
                         th:if="${#fields.hasErrors('phone')}"
                         th:errors="*{phone}">
                    </div>
                </div>

                <div class="col-md-6">
                    <label for="docket" class="form-label">
                        Legajo
                    </label>
                    <input type="text"
                           id="docket"
                           th:field="*{docket}"
                           class="form-control auth-input"
                           placeholder="Ingrese su legajo">

                    <div class="text-danger small mt-1"
                         th:if="${#fields.hasErrors('docket')}"
                         th:errors="*{docket}">
                    </div>
                </div>

                <div class="col-md-12">
                    <label for="password" class="form-label">
                        Contraseña
                    </label>
                    <input type="password"
                           id="password"
                           th:field="*{password}"
                           class="form-control auth-input"
                           placeholder="Ingrese una contraseña"
                           required>

                    <div class="text-danger small mt-1"
                         th:if="${#fields.hasErrors('password')}"
                         th:errors="*{password}">
                    </div>
                </div>

            </div>

            <button type="submit" class="btn auth-btn-primary w-100 mt-4">
                Registrarse
            </button>

        </form>

        <div class="auth-footer">
            <p>
                ¿Ya tiene una cuenta?
                <a th:href="@{/login}">
                    Iniciar sesión
                </a>
            </p>
        </div>

    </div>

</div>

</body>
</html>
