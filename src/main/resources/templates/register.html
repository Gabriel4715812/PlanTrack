<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - PlanTrack</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3a5f, #0f1f33);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }

        .register-card {
            width: 100%;
            max-width: 760px;
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            overflow: hidden;
        }

        .register-header {
            background-color: #1e3a5f;
            color: #ffffff;
            padding: 28px;
            text-align: center;
        }

        .register-header h1 {
            margin: 0;
            font-size: 32px;
            font-weight: bold;
        }

        .register-header p {
            margin-top: 8px;
            margin-bottom: 0;
            color: #dbe4ee;
        }

        .register-body {
            padding: 32px;
        }

        .btn-plantrack {
            background-color: #f28c28;
            border-color: #f28c28;
            color: #ffffff;
            font-weight: bold;
        }

        .btn-plantrack:hover {
            background-color: #d97706;
            border-color: #d97706;
            color: #ffffff;
        }

        .login-link {
            color: #1e3a5f;
            font-weight: bold;
            text-decoration: none;
        }

        .login-link:hover {
            color: #f28c28;
        }
    </style>
</head>

<body>

<div class="register-card">

    <div class="register-header">
        <h1>PlanTrack</h1>
        <p>Solicitud de registro de usuario</p>
    </div>

    <div class="register-body">

        <!-- Mensaje de error general -->
        <div class="alert alert-danger"
             th:if="${error != null}"
             th:text="${error}">
        </div>

        <!-- Mensaje de éxito -->
        <div class="alert alert-success"
             th:if="${success != null}"
             th:text="${success}">
        </div>

        <form th:action="@{/register}" method="post">

            <!-- CSRF Spring Security -->
            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label for="firstName" class="form-label">
                        Nombre
                    </label>
                    <input type="text"
                           class="form-control"
                           id="firstName"
                           name="firstName"
                           placeholder="Ingrese su nombre"
                           required>
                </div>

                <div class="col-md-6 mb-3">
                    <label for="lastName" class="form-label">
                        Apellido
                    </label>
                    <input type="text"
                           class="form-control"
                           id="lastName"
                           name="lastName"
                           placeholder="Ingrese su apellido"
                           required>
                </div>

            </div>

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label for="username" class="form-label">
                        Nombre de usuario
                    </label>
                    <input type="text"
                           class="form-control"
                           id="username"
                           name="username"
                           placeholder="Ejemplo: gnoriega"
                           required>
                </div>

                <div class="col-md-6 mb-3">
                    <label for="email" class="form-label">
                        Correo electrónico
                    </label>
                    <input type="email"
                           class="form-control"
                           id="email"
                           name="email"
                           placeholder="usuario@correo.com"
                           required>
                </div>

            </div>

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label for="phone" class="form-label">
                        Teléfono
                    </label>
                    <input type="text"
                           class="form-control"
                           id="phone"
                           name="phone"
                           placeholder="Ingrese su teléfono">
                </div>

                <div class="col-md-6 mb-3">
                    <label for="docket" class="form-label">
                        Legajo
                    </label>
                    <input type="text"
                           class="form-control"
                           id="docket"
                           name="docket"
                           placeholder="Ingrese su legajo">
                </div>

            </div>

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label for="password" class="form-label">
                        Contraseña
                    </label>
                    <input type="password"
                           class="form-control"
                           id="password"
                           name="password"
                           placeholder="Ingrese una contraseña"
                           required>
                </div>

                <div class="col-md-6 mb-3">
                    <label for="confirmPassword" class="form-label">
                        Confirmar contraseña
                    </label>
                    <input type="password"
                           class="form-control"
                           id="confirmPassword"
                           name="confirmPassword"
                           placeholder="Repita la contraseña"
                           required>
                </div>

            </div>

            <div class="alert alert-info mt-3">
                El registro genera una cuenta de usuario básica. La asignación de permisos
                o roles superiores será realizada posteriormente por un administrador.
            </div>

            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-plantrack btn-lg">
                    Registrarse
                </button>
            </div>

        </form>

        <div class="text-center mt-4">
            <span>¿Ya tiene una cuenta?</span>
            <a th:href="@{/login}" class="login-link">
                Iniciar sesión
            </a>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

</body>
</html>
