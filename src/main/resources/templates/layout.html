<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlanTrack</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

<div class="app-shell">

    <!-- TOPBAR -->
    <header class="topbar">

        <div class="topbar-left">
            <a th:href="@{/dashboard}" class="brand-link">
                <span class="brand-plan">Plan</span><span class="brand-track">Track</span>
            </a>
        </div>

        <div class="topbar-right">
            <div class="user-box text-end">
                <div class="user-name" sec:authentication="name">admin</div>

                <div class="user-role">
                    <span sec:authorize="hasRole('ADMIN')">Administrador</span>
                    <span sec:authorize="hasRole('DESIGNER')">Diseñador</span>
                    <span sec:authorize="hasRole('OPERATOR')">Operario</span>
                </div>
            </div>

            <form th:action="@{/logout}" method="post" class="logout-form">
                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">
                <button type="submit" class="btn btn-logout">
                    Cerrar sesión
                </button>
            </form>
        </div>

    </header>

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <nav class="sidebar-nav">

            <a th:href="@{/dashboard}"
               class="sidebar-link"
               th:classappend="${currentPath == '/dashboard'} ? ' active' : ''">
                <span class="sidebar-icon">🏠</span>
                <span>Dashboard</span>
            </a>

            <a sec:authorize="hasRole('ADMIN')"
               th:href="@{/users}"
               class="sidebar-link"
               th:classappend="${#strings.startsWith(currentPath, '/users')} ? ' active' : ''">
                <span class="sidebar-icon">👥</span>
                <span>Usuarios</span>
            </a>

            <a sec:authorize="hasAnyRole('ADMIN','DESIGNER')"
               th:href="@{/sectors}"
               class="sidebar-link"
               th:classappend="${#strings.startsWith(currentPath, '/sectors')} ? ' active' : ''">
                <span class="sidebar-icon">🏭</span>
                <span>Sectores</span>
            </a>

            <a sec:authorize="hasAnyRole('ADMIN','DESIGNER')"
               th:href="@{/equipments}"
               class="sidebar-link"
               th:classappend="${#strings.startsWith(currentPath, '/equipments')} ? ' active' : ''">
                <span class="sidebar-icon">⚙️</span>
                <span>Equipos</span>
            </a>

            <a sec:authorize="hasAnyRole('ADMIN','DESIGNER')"
               th:href="@{/parts}"
               class="sidebar-link"
               th:classappend="${#strings.startsWith(currentPath, '/parts')} ? ' active' : ''">
                <span class="sidebar-icon">🔩</span>
                <span>Piezas</span>
            </a>

            <a sec:authorize="hasAnyRole('ADMIN','DESIGNER')"
               th:href="@{/positions}"
               class="sidebar-link"
               th:classappend="${#strings.startsWith(currentPath, '/positions')} ? ' active' : ''">
                <span class="sidebar-icon">📍</span>
                <span>Posiciones</span>
            </a>

            <a sec:authorize="hasAnyRole('ADMIN','DESIGNER','OPERATOR')"
               th:href="@{/flats}"
               class="sidebar-link"
               th:classappend="${#strings.startsWith(currentPath, '/flats')} ? ' active' : ''">
                <span class="sidebar-icon">📄</span>
                <span>Planos</span>
            </a>

            <a sec:authorize="hasAnyRole('ADMIN','DESIGNER','OPERATOR')"
               th:href="@{/versions}"
               class="sidebar-link"
               th:classappend="${#strings.startsWith(currentPath, '/versions')} ? ' active' : ''">
                <span class="sidebar-icon">🗂️</span>
                <span>Versiones</span>
            </a>

            <a sec:authorize="hasAnyRole('ADMIN','DESIGNER','OPERATOR')"
               th:href="@{/qr}"
               class="sidebar-link"
               th:classappend="${#strings.startsWith(currentPath, '/qr')} ? ' active' : ''">
                <span class="sidebar-icon">📱</span>
                <span>Códigos QR</span>
            </a>

        </nav>

    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">

        <section class="content-area">

            <div th:if="${success != null}"
                 class="alert alert-success alert-dismissible fade show"
                 role="alert">
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div th:if="${error != null}"
                 class="alert alert-danger alert-dismissible fade show"
                 role="alert">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div th:if="${warning != null}"
                 class="alert alert-warning alert-dismissible fade show"
                 role="alert">
                <span th:text="${warning}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div layout:fragment="content">
                <!-- contenido -->
            </div>

        </section>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
