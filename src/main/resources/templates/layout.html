<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title layout:title-pattern="$CONTENT_TITLE - PlanTrack">
        PlanTrack
    </title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- CSS propio -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

<div class="app-wrapper">

    <!-- MENÚ LATERAL -->
    <aside class="sidebar">

        <div class="sidebar-brand">
            <span class="brand-title">PlanTrack</span>
            <span class="brand-subtitle">Gestión de planos</span>
        </div>

        <nav class="sidebar-nav">

            <a th:href="@{/dashboard}" class="sidebar-link">
                <span class="sidebar-icon">🏠</span>
                <span>Dashboard</span>
            </a>

            <a sec:authorize="hasRole('ADMIN')"
            th:href="@{/users}"
            class="sidebar-link">
                <span class="sidebar-icon">👥</span>
                <span>Usuarios</span>
            </a>

            <a sec:authorize="hasAnyRole('ADMIN','DESIGNER')"
            th:href="@{/sectors}"
            class="sidebar-link">
                <span class="sidebar-icon">🏭</span>
                <span>Sectores</span>
            </a>

            <a sec:authorize="hasAnyRole('ADMIN','DESIGNER')"
            th:href="@{/equipments}"
            class="sidebar-link">
                <span class="sidebar-icon">⚙️</span>
                <span>Equipos</span>
            </a>

            <a sec:authorize="hasAnyRole('ADMIN','DESIGNER')"
            th:href="@{/parts}"
            class="sidebar-link">
                <span class="sidebar-icon">🔩</span>
                <span>Piezas</span>
            </a>

            <a sec:authorize="hasAnyRole('ADMIN','DESIGNER')"
            th:href="@{/positions}"
            class="sidebar-link">
                <span class="sidebar-icon">📍</span>
                <span>Posiciones</span>
            </a>

            <a sec:authorize="hasAnyRole('ADMIN','DESIGNER','OPERATOR')"
            th:href="@{/flats}"
            class="sidebar-link">
                <span class="sidebar-icon">📄</span>
                <span>Planos</span>
            </a>

            <a sec:authorize="hasAnyRole('ADMIN','DESIGNER','OPERATOR')"
            th:href="@{/versions}"
            class="sidebar-link">
                <span class="sidebar-icon">🗂️</span>
                <span>Versiones</span>
            </a>

            <a sec:authorize="hasAnyRole('ADMIN','DESIGNER','OPERATOR')"
            th:href="@{/qr}"
            class="sidebar-link">
                <span class="sidebar-icon">📱</span>
                <span>Códigos QR</span>
            </a>

        </nav>

    </aside>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="main-content">

        <!-- BARRA SUPERIOR -->
        <header class="topbar">

            <div class="topbar-left">
                <h1 class="topbar-title">
                    Sistema de Gestión y Trazabilidad de Planos
                </h1>
            </div>

            <div class="topbar-right">

                <div class="text-end">
                    <div>
                        <strong sec:authentication="name"></strong>
                    </div>

                    <small class="text-muted">
                        <span sec:authorize="hasRole('ADMIN')">Administrador</span>
                        <span sec:authorize="hasRole('DESIGNER')">Diseñador</span>
                        <span sec:authorize="hasRole('OPERATOR')">Operario</span>
                    </small>
                </div>

                <form th:action="@{/logout}" method="post" class="logout-form">

                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}">

                    <button type="submit" class="btn btn-outline-danger btn-sm">
                        Cerrar sesión
                    </button>

                </form>

            </div>

        </header>

        <!-- ÁREA DINÁMICA DE CADA PANTALLA -->
        <section class="content-area">

            <div th:if="${success != null}"
                class="alert alert-success alert-dismissible fade show"
                role="alert">

                <span th:text="${success}"></span>

                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="alert"
                        aria-label="Close">
                </button>
            </div>

            <div th:if="${error != null}"
                class="alert alert-danger alert-dismissible fade show"
                role="alert">

                <span th:text="${error}"></span>

                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="alert"
                        aria-label="Close">
                </button>
            </div>

            <div th:if="${warning != null}"
                class="alert alert-warning alert-dismissible fade show"
                role="alert">

                <span th:text="${warning}"></span>

                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="alert"
                        aria-label="Close">
                </button>
            </div>

            <div layout:fragment="content">
                <!-- Contenido dinámico -->
            </div>

        </section>

    </main>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

<!-- Fragmento opcional para scripts propios de cada pantalla -->
<div layout:fragment="scripts"></div>

</body>
</html>
