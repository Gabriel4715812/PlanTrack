<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
    <title>Nuevo Usuario - PlanTrack</title>
</head>

<body>

<div layout:fragment="content">

    <div class="page-header">
        <h1 class="page-title">Registrar usuario</h1>
        <p class="page-subtitle">
            Complete los datos para crear un nuevo usuario dentro del sistema.
        </p>
    </div>

    <div class="card shadow-sm border-0">

        <div class="card-header">
            Datos del usuario
        </div>

        <div class="card-body">

            <form th:action="@{/users/save}"
                  th:object="${user}"
                  method="post">

                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">

                <div class="row g-3">

                    <div class="col-md-6">
                        <label for="firstName" class="form-label">
                            Nombre
                        </label>
                        <input type="text"
                               id="firstName"
                               th:field="*{firstName}"
                               class="form-control"
                               placeholder="Ingrese el nombre"
                               required>

                        <div class="text-danger small mt-1"
                             th:if="${#fields.hasErrors('firstName')}"
                             th:errors="*{firstName}">
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label for="lastName" class="form-label">
                            Apellido
                        </label>
                        <input type="text"
                               id="lastName"
                               th:field="*{lastName}"
                               class="form-control"
                               placeholder="Ingrese el apellido"
                               required>

                        <div class="text-danger small mt-1"
                             th:if="${#fields.hasErrors('lastName')}"
                             th:errors="*{lastName}">
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label for="username" class="form-label">
                            Usuario
                        </label>
                        <input type="text"
                               id="username"
                               th:field="*{username}"
                               class="form-control"
                               placeholder="Ingrese el nombre de usuario"
                               required>

                        <div class="text-danger small mt-1"
                             th:if="${#fields.hasErrors('username')}"
                             th:errors="*{username}">
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label for="email" class="form-label">
                            Correo electrónico
                        </label>
                        <input type="email"
                               id="email"
                               th:field="*{email}"
                               class="form-control"
                               placeholder="usuario@email.com"
                               required>

                        <div class="text-danger small mt-1"
                             th:if="${#fields.hasErrors('email')}"
                             th:errors="*{email}">
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label for="phone" class="form-label">
                            Teléfono
                        </label>
                        <input type="text"
                               id="phone"
                               th:field="*{phone}"
                               class="form-control"
                               placeholder="Ingrese el teléfono">
                    </div>

                    <div class="col-md-6">
                        <label for="docket" class="form-label">
                            Legajo
                        </label>
                        <input type="text"
                               id="docket"
                               th:field="*{docket}"
                               class="form-control"
                               placeholder="Ingrese el legajo">
                    </div>

                    <div class="col-md-6">
                        <label for="password" class="form-label">
                            Contraseña
                        </label>
                        <input type="password"
                               id="password"
                               th:field="*{password}"
                               class="form-control"
                               placeholder="Ingrese una contraseña"
                               required>

                        <div class="text-danger small mt-1"
                             th:if="${#fields.hasErrors('password')}"
                             th:errors="*{password}">
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label for="roleId" class="form-label">
                            Rol
                        </label>
                        <select id="roleId"
                                th:field="*{roleId}"
                                class="form-select"
                                required>

                            <option value="">
                                Seleccione un rol
                            </option>

                            <option th:each="role : ${roles}"
                                    th:value="${role.id}"
                                    th:text="${role.name}">
                            </option>

                        </select>

                        <div class="text-danger small mt-1"
                             th:if="${#fields.hasErrors('roleId')}"
                             th:errors="*{roleId}">
                        </div>
                    </div>

                    <div class="col-md-12">
                        <div class="form-check mt-2">
                            <input type="checkbox"
                                   id="enabled"
                                   th:field="*{enabled}"
                                   class="form-check-input">

                            <label for="enabled" class="form-check-label">
                                Usuario habilitado
                            </label>
                        </div>
                    </div>

                </div>

                <div class="d-flex justify-content-end gap-2 mt-4">

                    <a th:href="@{/users}" class="btn btn-secondary">
                        Cancelar
                    </a>

                    <button type="submit" class="btn btn-primary">
                        Guardar usuario
                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

</body>
</html>
