<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
    <title>Formulario de Usuario</title>
</head>

<body>

<div layout:fragment="content">

    <div class="container-fluid">

        <div class="mb-4">
            <h2 class="page-title mb-1"
                th:text="${user.id == null ? 'Registrar Usuario' : 'Editar Usuario'}">
            </h2>

            <p class="text-muted mb-0">
                Complete los datos del usuario y asigne su rol correspondiente.
            </p>
        </div>

        <div class="card shadow-sm border-0">

            <div class="card-body">

                <form th:action="${user.id == null} ? @{/users/save} : @{/users/update}"
                      th:object="${user}"
                      method="post">

                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}">

                    <input type="hidden" th:field="*{id}">

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label for="firstName" class="form-label">
                                Nombre
                            </label>

                            <input type="text"
                                   id="firstName"
                                   class="form-control"
                                   th:field="*{firstName}"
                                   placeholder="Ingrese el nombre">

                            <div class="text-danger small"
                                 th:if="${#fields.hasErrors('firstName')}"
                                 th:errors="*{firstName}">
                            </div>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="lastName" class="form-label">
                                Apellido
                            </label>

                            <input type="text"
                                   id="lastName"
                                   class="form-control"
                                   th:field="*{lastName}"
                                   placeholder="Ingrese el apellido">

                            <div class="text-danger small"
                                 th:if="${#fields.hasErrors('lastName')}"
                                 th:errors="*{lastName}">
                            </div>
                        </div>

                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label for="username" class="form-label">
                                Usuario
                            </label>

                            <input type="text"
                                   id="username"
                                   class="form-control"
                                   th:field="*{username}"
                                   placeholder="Ingrese el nombre de usuario">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label">
                                Email
                            </label>

                            <input type="email"
                                   id="email"
                                   class="form-control"
                                   th:field="*{email}"
                                   placeholder="usuario@correo.com">
                        </div>

                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label for="phone" class="form-label">
                                Teléfono
                            </label>

                            <input type="text"
                                   id="phone"
                                   class="form-control"
                                   th:field="*{phone}"
                                   placeholder="Teléfono">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="docket" class="form-label">
                                Legajo
                            </label>

                            <input type="text"
                                   id="docket"
                                   class="form-control"
                                   th:field="*{docket}"
                                   placeholder="Legajo">
                        </div>

                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label for="password" class="form-label">
                                Contraseña
                            </label>

                            <input type="password"
                                   id="password"
                                   class="form-control"
                                   th:field="*{password}"
                                   placeholder="Ingrese una contraseña">

                            <div class="form-text">
                                Si está editando un usuario, puede dejar este campo vacío para conservar la contraseña actual.
                            </div>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="roleId" class="form-label">
                                Rol
                            </label>

                            <select id="roleId"
                                    class="form-select"
                                    th:field="*{roleId}">

                                <option value="">
                                    Seleccione un rol...
                                </option>

                                <option th:each="role : ${roles}"
                                        th:value="${role.id}"
                                        th:text="${role.name}">
                                </option>

                            </select>
                        </div>

                    </div>

                    <div class="mb-4">
                        <label class="form-label">
                            Estado
                        </label>

                        <select class="form-select"
                                th:field="*{enabled}">

                            <option th:value="true">
                                Activo
                            </option>

                            <option th:value="false">
                                Inactivo
                            </option>

                        </select>
                    </div>

                    <div class="d-flex justify-content-end gap-2">

                        <a th:href="@{/users}" class="btn btn-secondary">
                            Cancelar
                        </a>

                        <button type="submit" class="btn btn-primary"
                                th:text="${user.id == null ? 'Guardar Usuario' : 'Actualizar Usuario'}">
                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
