spring.application.name=plantrack-demo

server.port=8080

# Base de datos embebida H2 para demo portable
spring.datasource.url=jdbc:h2:file:./data/plantrack_demo;MODE=MySQL;DATABASE_TO_UPPER=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false

# Archivos
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Carpetas locales de la demo
plantrack.upload-dir=uploads/flats
plantrack.version-upload-dir=uploads/versions
plantrack.qr-upload-dir=uploads/qr